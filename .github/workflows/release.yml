name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
      dry_run:
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ inputs.version }}${{ case(inputs.dry_run, ' (dry run)', '') }}
    runs-on: ubuntu-latest
    env:
      RELEASE_REPOSITORY: ${{ github.repository }}
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Validate version
        run: |
          echo -n "${RELEASE_VERSION}" | grep -qE '^v[0-9]+[.][0-9]+[.][0-9]+$' || { echo 'invalid version'; exit 1; }
      - name: Check README.md
        run: |
          grep -i "uses: ${RELEASE_REPOSITORY}@v" README.md || { echo 'wtf: no version found in readme'; exit 1; }
      - name: Update README.md versions
        run: |
          sed -E "s|${RELEASE_REPOSITORY}@v[0-9]+[.][0-9]+[.][0-9]+|${RELEASE_REPOSITORY}@${RELEASE_VERSION}|Ig" -i README.md &&
          sed -E "s|${RELEASE_REPOSITORY}@v[0-9]+|${RELEASE_REPOSITORY}@${RELEASE_VERSION%%.*}|Ig" -i README.md
      - name: Update package.json version
        run: |
          sed -E "/version/s|[0-9]+[.][0-9]+[.][0-9]+|${RELEASE_VERSION#v}|" -i package.json
      - name: Update package-lock.json version
        run: npm install --package-lock-only --ignore-scripts
      - name: Stage changes
        run: git add . && git diff --staged
      - name: Push release commit
        uses: pgaskin/push-signed-commits@v0.0.8
        with:
          commit-message: Release ${{ inputs.version }}
          allow-empty: true
          dry-run: ${{ inputs.dry_run }}
        id: commit
      - name: Create draft release
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.payload.inputs.version,
              target_commitish: '${{steps.commit.outputs.commit-oid}}',
              name: context.payload.inputs.version,
              draft: true,
            })
        if: ${{ !inputs.dry_run }}
