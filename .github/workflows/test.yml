name: Test

on:
  push:
    branches:
      - '**'
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        go:
          - 1.21.x
          - stable
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - run: go vet .
      - run: mkdir cover && echo .cover >> .git/info/exclude
      - run: go test -v -cover . -test.gocoverdir=cover
      - run: go tool covdata textfmt -i=cover -o=cover/data
      - run: go tool cover -func=cover/data
