name: Test

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: npm ci
      - run: npx tsc
      - run: node --test --experimental-test-coverage
  action:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-slim
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./
        with:
          dry-run: true # don't actually push anything
          revision: 8e08c6cc1889ff1e055a22cd447d3fe8b0517dc7..4943602fa12f897d889eb6a7db0f9f37233c0076
